name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: node scripts/security-scan.mjs

      - name: Unit tests
        run: npx nx run-many -t test --all

      - name: Ingestion Cucumber tests
        run: npx nx run ingestion-microservice:test:e2e

      - name: Build
        run: npx nx run-many -t build --all
